name: aurion

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: aurion
      POSTGRES_USER: ${POSTGRES_USER:-aurion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurion}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
